services:
  db:
    image: postgres:16-alpine
    env_file: .env
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    env_file: .env
    environment:
      - TERM=xterm-256color
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ${RESUME_DIR}:/data
      - ./config:/app/config
      - ./output:/app/output
    stdin_open: true
    tty: true
    command: ["tail", "-f", "/dev/null"]

  web:
    build: .
    env_file: .env
    environment:
      - PYTHONPATH=/app
    ports:
      - "8501:8501"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./web:/app/web
      - ./config:/app/config
      - ./output:/app/output
    command: ["streamlit", "run", "web/app.py", "--server.port=8501", "--server.address=0.0.0.0"]

volumes:
  pgdata:
